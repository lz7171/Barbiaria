<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbearia | Agendamento</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --dark: #1a1208;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --warm: #8b6914;
    --red: #8b1a1a;
    --text-muted: #6b5c3e;
    --border: rgba(201,168,76,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── BACKGROUND TEXTURE ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(201,168,76,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139,26,26,0.08) 0%, transparent 60%),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 40px,
        rgba(201,168,76,0.02) 40px,
        rgba(201,168,76,0.02) 41px
      );
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 860px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* ─── HEADER ─── */
  header {
    text-align: center;
    padding: 64px 24px 48px;
    position: relative;
  }

  .logo-scissors {
    font-size: 2rem;
    display: inline-block;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 12px rgba(201,168,76,0.6));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header .tagline {
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 10px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px auto;
    max-width: 320px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  .divider span { color: var(--gold); font-size: 1.1rem; }

  /* ─── CARD ─── */
  .card {
    background: rgba(26,18,8,0.7);
    border: 1px solid var(--border);
    border-radius: 4px;
    backdrop-filter: blur(12px);
    padding: 40px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-title .step {
    width: 28px; height: 28px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-family: 'DM Sans', sans-serif;
    flex-shrink: 0;
  }

  /* ─── SERVIÇOS GRID ─── */
  .servicos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }

  .servico-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 16px 12px;
    color: var(--cream);
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: left;
    position: relative;
  }

  .servico-btn:hover {
    border-color: var(--gold);
    background: rgba(201,168,76,0.05);
  }

  .servico-btn.selected {
    border-color: var(--gold);
    background: rgba(201,168,76,0.1);
    box-shadow: 0 0 20px rgba(201,168,76,0.12);
  }

  .servico-btn .s-name {
    font-size: 0.9rem;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .servico-btn .s-price {
    font-size: 0.8rem;
    color: var(--gold);
    font-weight: 500;
  }

  .servico-btn .s-duracao {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .servico-btn .check {
    position: absolute;
    top: 10px; right: 10px;
    width: 18px; height: 18px;
    background: var(--gold);
    border-radius: 50%;
    display: none;
    align-items: center; justify-content: center;
    font-size: 0.65rem;
    color: var(--dark);
    font-weight: 700;
  }

  .servico-btn.selected .check { display: flex; }

  /* ─── FORM FIELDS ─── */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 540px) { .form-row { grid-template-columns: 1fr; } }

  .form-group { margin-bottom: 0; }

  label {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  input, select {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px 14px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
  }

  input:focus, select:focus { border-color: var(--gold); }

  input::placeholder { color: rgba(245,240,232,0.25); }

  select option { background: #1a1208; color: var(--cream); }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    pointer-events: none;
    font-size: 0.8rem;
  }

  /* ─── HORÁRIOS ─── */
  .horarios-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 8px;
  }

  .horario-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 6px;
    color: var(--cream);
    font-size: 0.82rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .horario-btn:hover:not(.ocupado) { border-color: var(--gold); background: rgba(201,168,76,0.06); }

  .horario-btn.selected {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--dark);
    font-weight: 600;
  }

  .horario-btn.ocupado {
    opacity: 0.3;
    cursor: not-allowed;
    text-decoration: line-through;
  }

  /* ─── RESUMO ─── */
  .resumo {
    background: rgba(201,168,76,0.06);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 20px;
    font-size: 0.88rem;
    line-height: 1.8;
  }

  .resumo-item { display: flex; justify-content: space-between; }
  .resumo-item .r-label { color: var(--text-muted); }
  .resumo-item .r-val { color: var(--cream); font-weight: 500; }
  .resumo hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

  /* ─── BOTÃO WHATSAPP ─── */
  .btn-wtz {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    background: linear-gradient(135deg, #25D366, #128C7E);
    color: white;
    border: none;
    border-radius: 3px;
    padding: 18px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.3s ease;
    margin-top: 28px;
    position: relative;
    overflow: hidden;
  }

  .btn-wtz::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #128C7E, #25D366);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn-wtz:hover::before { opacity: 1; }
  .btn-wtz:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(37,211,102,0.3); }
  .btn-wtz:active { transform: translateY(0); }

  .btn-wtz svg { position: relative; z-index: 1; flex-shrink: 0; }
  .btn-wtz span { position: relative; z-index: 1; }

  /* ─── FOOTER ─── */
  footer {
    text-align: center;
    padding: 40px 24px;
    color: var(--text-muted);
    font-size: 0.78rem;
    letter-spacing: 0.05em;
  }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--red);
    color: white;
    padding: 12px 24px;
    border-radius: 3px;
    font-size: 0.88rem;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ─── ANIMAÇÕES DE ENTRADA ─── */
  .card {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.5s ease forwards;
  }
  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.2s; }
  .card:nth-child(3) { animation-delay: 0.3s; }
  .card:nth-child(4) { animation-delay: 0.4s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── BADGE OCUPADO ─── */
  .legend {
    display: flex;
    gap: 16px;
    margin-bottom: 14px;
    font-size: 0.74rem;
    color: var(--text-muted);
  }

  .legend-item { display: flex; align-items: center; gap: 6px; }
  .leg-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .leg-dot.livre { background: var(--gold); }
  .leg-dot.ocupado { background: #444; }
</style>
</head>
<body>

<header>
  <div class="logo-scissors">✂️</div>
  <h1 id="nome-barbearia">Barbearia Silva</h1>
  <p class="tagline">Agende seu horário com facilidade</p>
  <div class="divider"><span>✦</span></div>
</header>

<div class="container">

  <!-- SERVIÇOS -->
  <div class="card">
    <div class="card-title"><span class="step">1</span> Escolha o Serviço</div>
    <div class="servicos-grid" id="servicos-grid"></div>
  </div>

  <!-- DADOS PESSOAIS -->
  <div class="card">
    <div class="card-title"><span class="step">2</span> Seus Dados</div>
    <div class="form-row">
      <div class="form-group">
        <label>Seu nome</label>
        <input type="text" id="cliente-nome" placeholder="Ex: João Silva">
      </div>
      <div class="form-group">
        <label>WhatsApp</label>
        <input type="tel" id="cliente-tel" placeholder="(21) 99999-9999">
      </div>
    </div>
  </div>

  <!-- DATA E HORÁRIO -->
  <div class="card">
    <div class="card-title"><span class="step">3</span> Data e Horário</div>
    <div class="form-row" style="margin-bottom:20px;">
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="data-input">
      </div>
      <div class="form-group">
        <label>Barbeiro</label>
        <div class="select-wrap">
          <select id="barbeiro-select">
            <option value="">Qualquer barbeiro</option>
            <option value="Carlos">Carlos</option>
            <option value="Rafael">Rafael</option>
            <option value="Marcos">Marcos</option>
          </select>
        </div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="leg-dot livre"></div> Disponível</div>
      <div class="legend-item"><div class="leg-dot ocupado"></div> Ocupado</div>
    </div>

    <div class="horarios-grid" id="horarios-grid"></div>
  </div>

  <!-- RESUMO + BOTÃO -->
  <div class="card">
    <div class="card-title"><span class="step">4</span> Confirmar Agendamento</div>
    <div class="resumo" id="resumo">
      <div class="resumo-item"><span class="r-label">Serviço</span><span class="r-val" id="r-servico">—</span></div>
      <div class="resumo-item"><span class="r-label">Barbeiro</span><span class="r-val" id="r-barbeiro">—</span></div>
      <div class="resumo-item"><span class="r-label">Data</span><span class="r-val" id="r-data">—</span></div>
      <div class="resumo-item"><span class="r-label">Horário</span><span class="r-val" id="r-horario">—</span></div>
      <hr>
      <div class="resumo-item"><span class="r-label">Valor</span><span class="r-val" id="r-valor" style="color:var(--gold)">—</span></div>
    </div>

    <button class="btn-wtz" onclick="enviarWhatsApp()">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="white">
        <path d="M16 .5C7.44.5.5 7.44.5 16c0 2.84.75 5.56 2.17 7.94L.5 31.5l7.78-2.14A15.44 15.44 0 0016 31.5C24.56 31.5 31.5 24.56 31.5 16S24.56.5 16 .5zm0 28a13.43 13.43 0 01-7-1.98l-.5-.3-5.18 1.42 1.44-5.05-.33-.52A13.44 13.44 0 1116 28.5zm7.38-9.97c-.4-.2-2.38-1.17-2.75-1.3-.37-.13-.64-.2-.9.2-.27.4-1.04 1.3-1.27 1.57-.23.27-.47.3-.87.1a10.96 10.96 0 01-3.22-1.98 12.14 12.14 0 01-2.23-2.77c-.23-.4-.02-.61.18-.81.18-.18.4-.47.6-.7.2-.23.27-.4.4-.67.13-.27.07-.5-.03-.7-.1-.2-.9-2.17-1.24-2.97-.32-.77-.65-.66-.9-.67h-.76c-.27 0-.7.1-1.06.5s-1.4 1.37-1.4 3.33 1.43 3.87 1.63 4.13c.2.27 2.82 4.3 6.83 6.03.96.41 1.7.66 2.28.84.96.3 1.83.26 2.52.16.77-.12 2.38-.97 2.72-1.91.33-.94.33-1.74.23-1.91-.1-.17-.37-.27-.77-.47z"/>
      </svg>
      <span>Confirmar via WhatsApp</span>
    </button>
  </div>

</div>

<footer>
  © 2025 — Todos os direitos reservados &nbsp;✦&nbsp; Desenvolvido com carinho
</footer>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
// ⚙️  CONFIGURAÇÕES — edite aqui!
// ════════════════════════════════════════════
const CONFIG = {
  nomeBarbearia: "Barbearia Silva",      // Nome da sua barbearia
  whatsappNumero: "5521999999999",       // Número com DDI+DDD, sem espaços/traços
  horarioAbertura: 9,                    // Hora de abertura (9 = 09:00)
  horarioFechamento: 19,                 // Hora de fechamento (19 = 19:00)
  intervaloMinutos: 30,                  // Intervalo entre horários (30 min)

  servicos: [
    { nome: "Corte Masculino",  preco: "R$ 40",  duracao: "30 min" },
    { nome: "Barba",            preco: "R$ 30",  duracao: "20 min" },
    { nome: "Corte + Barba",    preco: "R$ 60",  duracao: "50 min" },
    { nome: "Pezinho / Acabamento", preco: "R$ 20", duracao: "15 min" },
    { nome: "Sobrancelha",      preco: "R$ 15",  duracao: "10 min" },
    { nome: "Hidratação",       preco: "R$ 35",  duracao: "30 min" },
  ],

  // Horários já ocupados — adicione no formato "YYYY-MM-DD|HH:MM"
  horariosOcupados: [
    // Exemplo: "2025-06-10|10:00", "2025-06-10|14:30"
  ],
};
// ════════════════════════════════════════════

// Inicializar
document.title = CONFIG.nomeBarbearia + " | Agendamento";
document.getElementById("nome-barbearia").textContent = CONFIG.nomeBarbearia;

let selecionado = { servico: null, horario: null };

// ── SERVIÇOS ──
const grid = document.getElementById("servicos-grid");
CONFIG.servicos.forEach((s, i) => {
  const btn = document.createElement("button");
  btn.className = "servico-btn";
  btn.innerHTML = `
    <div class="check">✓</div>
    <div class="s-name">${s.nome}</div>
    <div class="s-price">${s.preco}</div>
    <div class="s-duracao">${s.duracao}</div>
  `;
  btn.onclick = () => {
    document.querySelectorAll(".servico-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selecionado.servico = s;
    atualizarResumo();
  };
  grid.appendChild(btn);
});

// ── DATA MÍNIMA = hoje ──
const hoje = new Date();
const pad = n => String(n).padStart(2,"0");
const hojeStr = `${hoje.getFullYear()}-${pad(hoje.getMonth()+1)}-${pad(hoje.getDate())}`;
document.getElementById("data-input").min = hojeStr;
document.getElementById("data-input").value = hojeStr;

document.getElementById("data-input").addEventListener("change", gerarHorarios);
document.getElementById("barbeiro-select").addEventListener("change", atualizarResumo);

// ── GERAR HORÁRIOS ──
function gerarHorarios() {
  const data = document.getElementById("data-input").value;
  const container = document.getElementById("horarios-grid");
  container.innerHTML = "";
  selecionado.horario = null;
  atualizarResumo();

  const slots = [];
  for (let h = CONFIG.horarioAbertura; h < CONFIG.horarioFechamento; h++) {
    for (let m = 0; m < 60; m += CONFIG.intervaloMinutos) {
      slots.push(`${pad(h)}:${pad(m)}`);
    }
  }

  slots.forEach(hora => {
    const chave = `${data}|${hora}`;
    const ocupado = CONFIG.horariosOcupados.includes(chave);
    const btn = document.createElement("button");
    btn.className = "horario-btn" + (ocupado ? " ocupado" : "");
    btn.textContent = hora;
    if (!ocupado) {
      btn.onclick = () => {
        document.querySelectorAll(".horario-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selecionado.horario = hora;
        atualizarResumo();
      };
    }
    container.appendChild(btn);
  });
}

gerarHorarios();

// ── RESUMO ──
function atualizarResumo() {
  const data = document.getElementById("data-input").value;
  const barbeiro = document.getElementById("barbeiro-select").value;

  const formatarData = d => {
    if (!d) return "—";
    const [y,m,dia] = d.split("-");
    const ds = new Date(y,m-1,dia);
    return ds.toLocaleDateString("pt-BR", { weekday:"long", day:"2-digit", month:"long" });
  };

  document.getElementById("r-servico").textContent = selecionado.servico?.nome || "—";
  document.getElementById("r-valor").textContent = selecionado.servico?.preco || "—";
  document.getElementById("r-barbeiro").textContent = barbeiro || "Qualquer barbeiro";
  document.getElementById("r-data").textContent = data ? formatarData(data) : "—";
  document.getElementById("r-horario").textContent = selecionado.horario || "—";
}

// ── WHATSAPP ──
function enviarWhatsApp() {
  const nome = document.getElementById("cliente-nome").value.trim();
  const tel = document.getElementById("cliente-tel").value.trim();
  const data = document.getElementById("data-input").value;
  const barbeiro = document.getElementById("barbeiro-select").value;

  if (!nome) return showToast("Por favor, informe seu nome.");
  if (!selecionado.servico) return showToast("Escolha um serviço.");
  if (!data) return showToast("Selecione a data.");
  if (!selecionado.horario) return showToast("Selecione um horário.");

  const dataFmt = new Date(data + "T12:00:00").toLocaleDateString("pt-BR", {
    weekday:"long", day:"2-digit", month:"long", year:"numeric"
  });

  const linhas = [
    `✂️ *Agendamento — ${CONFIG.nomeBarbearia}*`,
    ``,
    `👤 *Nome:* ${nome}`,
    tel ? `📱 *WhatsApp:* ${tel}` : null,
    ``,
    `💈 *Serviço:* ${selecionado.servico.nome}`,
    `💰 *Valor:* ${selecionado.servico.preco}`,
    barbeiro ? `👨‍💈 *Barbeiro:* ${barbeiro}` : null,
    ``,
    `📅 *Data:* ${dataFmt}`,
    `⏰ *Horário:* ${selecionado.horario}`,
    ``,
    `_Mensagem enviada pelo site de agendamento._`,
  ].filter(l => l !== null).join("\n");

  const url = `https://wa.me/${CONFIG.whatsappNumero}?text=${encodeURIComponent(linhas)}`;
  window.open(url, "_blank");
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = "⚠️  " + msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

// ── MÁSCARA TELEFONE ──
document.getElementById("cliente-tel").addEventListener("input", function(e) {
  let v = e.target.value.replace(/\D/g,"");
  if (v.length > 11) v = v.slice(0,11);
  if (v.length > 6) v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
  else if (v.length > 2) v = `(${v.slice(0,2)}) ${v.slice(2)}`;
